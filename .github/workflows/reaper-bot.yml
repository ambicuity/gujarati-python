name: Ping and Auto-Unassign

on:
  schedule:
    # Runs daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  manage-assignees:
    name: Check Inactivity and Manage Assignees
    runs-on: ubuntu-latest
    steps:
      - name: Ping inactive assignees and auto-unassign
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const msPerDay = 1000 * 60 * 60 * 24;
            const now = Date.now();
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const PING_AFTER_DAYS = 2;
            const UNASSIGN_AFTER_DAYS = 7;

            // Fetch all open issues across pages
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo,
              state: 'open',
              per_page: 100
            });

            for (const issue of issues) {
              // Skip PRs (they share the issues API)
              if (issue.pull_request) continue;
              // Skip unassigned
              if (!issue.assignees || issue.assignees.length === 0) continue;
              // Skip issues that are not explicitly marked as in progress
              const hasInProgressLabel = issue.labels.some(l => l.name === 'status: in-progress');
              if (!hasInProgressLabel) continue;

              const updatedAt = new Date(issue.updated_at).getTime();
              const daysInactive = (now - updatedAt) / msPerDay;
              const hasAwaitingLabel = issue.labels.some(l => l.name === 'awaiting-response');
              const assignees = issue.assignees.map(a => a.login);
              const assigneeMentions = assignees.map(a => `@${a}`).join(' ');

              // ── Phase 2: Unassign if awaiting-response for 7+ days ──
              // Check this FIRST to avoid re-pinging on the same run
              if (daysInactive > UNASSIGN_AFTER_DAYS && hasAwaitingLabel) {
                console.log(`#${issue.number}: ${daysInactive.toFixed(1)}d inactive with awaiting-response. Unassigning.`);

                await github.rest.issues.createComment({
                  owner, repo, issue_number: issue.number,
                  body: `It looks like you've been busy, ${assigneeMentions}! To keep the project moving, I'm going to remove your assignment for now so someone else can jump in.\n\nFeel free to reassign yourself or grab a new issue when you have more time. Thanks for your interest! 🚀`
                });

                await github.rest.issues.removeAssignees({
                  owner, repo, issue_number: issue.number,
                  assignees: assignees
                });

                // Clean up labels
                for (const label of ['awaiting-response', 'status: in-progress']) {
                  try {
                    await github.rest.issues.removeLabel({
                      owner, repo, issue_number: issue.number,
                      name: label
                    });
                  } catch (e) { /* Safe to ignore */ }
                }
                continue;
              }

              // ── Phase 1: Ping after 2+ days of inactivity ──
              if (daysInactive > PING_AFTER_DAYS && !hasAwaitingLabel) {
                console.log(`#${issue.number}: ${daysInactive.toFixed(1)}d inactive. Pinging assignee.`);

                await github.rest.issues.createComment({
                  owner, repo, issue_number: issue.number,
                  body: `Hi ${assigneeMentions}! 👋 Just checking in. Are you still working on this?\n\n` +
                    `* Reply with **\`/working\`** if you are still on it!\n` +
                    `* Reply with **\`/need help\`** if you are stuck.\n\n` +
                    `If we don't hear back in 7 days, we'll gently unassign this so someone else can pick it up. No pressure!`
                });

                await github.rest.issues.addLabels({
                  owner, repo, issue_number: issue.number,
                  labels: ['awaiting-response']
                });
              } else {
                console.log(`#${issue.number}: Active (${daysInactive.toFixed(1)}d). No action needed.`);
              }
            }
