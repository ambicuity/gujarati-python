name: PR Changelog Reminder

# Posts a one-time reminder comment if a code-change PR does not include
# a CHANGELOG.md update. Only fires for community PRs, not the maintainer or bots.
# Does not block merge — purely advisory.

on:
  pull_request:
    types: [opened, synchronize]
    paths-ignore:
      - 'config.yml'
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/**'

permissions:
  pull-requests: write

jobs:
  changelog-reminder:
    name: Remind contributor to update CHANGELOG.md
    runs-on: ubuntu-latest
    steps:
      - name: Check for CHANGELOG update
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const author = pr.user.login;
            const prNumber = pr.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Maintainer and bots don't need reminders
            const EXEMPT_USERS = ['ambicuity', 'dependabot[bot]', 'github-actions[bot]'];
            if (EXEMPT_USERS.includes(author)) {
              console.log(`Exempting ${author} from changelog reminder.`);
              return;
            }

            // Get list of files changed in this PR
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner, repo, pull_number: prNumber
            });

            const changedFilenames = files.map(f => f.filename);
            const changelogUpdated = changedFilenames.some(f =>
              f === 'CHANGELOG.md' || f.endsWith('CHANGELOG.md')
            );

            if (changelogUpdated) {
              console.log('CHANGELOG.md is in the diff. No reminder needed.');

              // Clean up prior reminder if CHANGELOG was added in a later push
              const comments = await github.rest.issues.listComments({
                owner, repo, issue_number: prNumber
              });
              const prior = comments.data.find(c =>
                c.user.login === 'github-actions[bot]' &&
                c.body.includes('CHANGELOG.md')
              );
              if (prior) {
                await github.rest.issues.deleteComment({
                  owner, repo, comment_id: prior.id
                });
              }
              return;
            }

            // Check if we already reminded (don't post twice)
            const allComments = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber
            });
            const alreadyReminded = allComments.data.some(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('CHANGELOG.md')
            );
            if (alreadyReminded) {
              console.log('Already posted changelog reminder. Skipping.');
              return;
            }

            const bold = (s) => `**${s}**`;
            const body = [
              '## Reminder: Update CHANGELOG.md',
              '',
              `@${author} — this PR touches code files but does not include a \`CHANGELOG.md\` update.`,
              '',
              bold('You do not need to update the changelog for:'),
              '- Config-only changes (`config.yml`)',
              '- Documentation-only changes (`*.md`, `docs/`)',
              '- CI/CD workflow changes (`.github/workflows/`)',
              '',
              bold('You should update CHANGELOG.md if:'),
              '- You changed core Python files like `મુખ્ય.py`',
              '- You added new functionality',
              '- You fixed a bug',
              '',
              'Add your entry under `## [Unreleased]` at the top of `CHANGELOG.md`.',
              '',
              '_This is a reminder only — it does not block merging._',
            ].join('\n');

            await github.rest.issues.createComment({
              owner, repo, issue_number: prNumber, body
            });
