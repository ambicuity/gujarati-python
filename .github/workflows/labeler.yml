name: PR Auto-Labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  add-labels:
    name: Auto-assign Labels
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@v6
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          sync-labels: true
