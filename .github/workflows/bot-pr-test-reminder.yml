name: Test Coverage Reminder

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'ગુજરાતી_પાઈથન/**/*.py'
      - 'મુખ્ય.py'
      - 'રંગોળી.py'

permissions:
  pull-requests: write

jobs:
  test-reminder:
    name: Test Coverage Reminder
    runs-on: ubuntu-latest
    steps:
      - name: Check for tests alongside core changes
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const author = pr.user.login;
            const prNumber = pr.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const EXEMPT_USERS = ['ambicuity', 'github-actions[bot]', 'dependabot[bot]'];
            if (EXEMPT_USERS.includes(author)) {
              console.log(`Exempt user ${author} — skipping test reminder.`);
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner, repo, pull_number: prNumber
            });

            const filenames = files.map(f => f.filename);
            const touchedCore = filenames.some(f => f.startsWith('ગુજરાતી_પાઈથન/') || f === 'મુખ્ય.py' || f === 'રંગોળી.py');
            const touchedTests = filenames.some(f => f.startsWith('ટેસ્ટ/') || f.startsWith('tests/'));

            if (!touchedCore || touchedTests) {
              console.log('Tests present or core not modified. No reminder needed.');

              // Remove prior reminder if tests were added in a later push
              if (touchedTests) {
                const comments = await github.rest.issues.listComments({
                  owner, repo, issue_number: prNumber
                });
                const prior = comments.data.find(c =>
                  c.user.login === 'github-actions[bot]' &&
                  c.body.includes('no test file was changed')
                );
                if (prior) {
                  await github.rest.issues.deleteComment({
                    owner, repo, comment_id: prior.id
                  });
                  console.log('Removed prior test coverage reminder (tests now present).');
                }
              }
              return;
            }

            // Check if we already reminded on a prior push
            const allComments = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber
            });
            const alreadyPosted = allComments.data.some(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('no test file was changed')
            );
            if (alreadyPosted) {
              console.log('Already posted test reminder. Skipping.');
              return;
            }

            const bold = (s) => `**${s}**`;
            const body = [
              '## Reminder: Add Tests for Core Changes',
              '',
              `@${author} — this PR modifies core Python files but`,
              'no test file was changed in `ટેસ્ટ/` or `tests/`.',
              '',
              bold('Why tests matter here:'),
              '- Gujarati Python depends on correct translation and execution.',
              '- Edge cases in Unicode parsing or syntax will silently break users code.',
              '- A missing test today is a broken script block tomorrow.',
              '',
              bold('What to add:'),
              '- A test in `ટેસ્ટ/` covering your change.',
              '- Test the happy path AND at least one edge case.',
              '',
              '_This is a reminder only — it does not block merging._',
              '_CodeRabbit will require tests during review if the change warrants them._',
            ].join('\n');

            await github.rest.issues.createComment({
              owner, repo, issue_number: prNumber, body
            });
            console.log('Posted test coverage reminder.');
