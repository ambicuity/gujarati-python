name: All Contributors — Auto-Credit

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: hall-of-fame-${{ github.repository }}
  cancel-in-progress: false

jobs:
  add-contributor:
    name: Add Contributor
    runs-on: ubuntu-latest
    if: >
      contains(github.event.comment.body, '@all-contributors') &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Parse comment command
        id: parse
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          python3 scripts/hall_of_fame.py parse-command --comment-body "$COMMENT_BODY" >> "$GITHUB_OUTPUT"

      - name: Reply with usage help
        if: steps.parse.outputs.valid != 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: process.env.ERROR_MESSAGE,
            });
        env:
          ERROR_MESSAGE: ${{ steps.parse.outputs.error_message }}

      - name: Fetch contributor metadata
        id: metadata
        if: steps.parse.outputs.valid == 'true'
        uses: actions/github-script@v8
        env:
          TARGET_LOGIN: ${{ steps.parse.outputs.login }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              const { data: user } = await github.rest.users.getByUsername({
                username: process.env.TARGET_LOGIN,
              });
              core.setOutput('found', 'true');
              core.setOutput('login', user.login);
              core.setOutput('name', user.name || user.login);
              core.setOutput('avatar_url', user.avatar_url);
              core.setOutput('profile', user.html_url);
            } catch (error) {
              core.setOutput('found', 'false');
              core.setOutput(
                'error_message',
                `I couldn't find @${process.env.TARGET_LOGIN}. Please check the username and try again.`,
              );
            }

      - name: Reply when account lookup fails
        if: steps.parse.outputs.valid == 'true' && steps.metadata.outputs.found != 'true'
        uses: actions/github-script@v8
        env:
          ERROR_MESSAGE: ${{ steps.metadata.outputs.error_message }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: process.env.ERROR_MESSAGE,
            });

      - name: Update Hall of Fame
        id: hall_of_fame
        if: steps.parse.outputs.valid == 'true' && steps.metadata.outputs.found == 'true'
        env:
          TARGET_LOGIN: ${{ steps.metadata.outputs.login }}
          TARGET_NAME: ${{ steps.metadata.outputs.name }}
          TARGET_AVATAR_URL: ${{ steps.metadata.outputs.avatar_url }}
          TARGET_PROFILE: ${{ steps.metadata.outputs.profile }}
          CONTRIBUTIONS_JSON: ${{ steps.parse.outputs.contributions_json }}
        run: |
          python3 scripts/hall_of_fame.py upsert \
            --config .all-contributorsrc \
            --hall-of-fame CONTRIBUTORS.md \
            --owner "${{ github.repository_owner }}" \
            --repo "${{ github.event.repository.name }}" \
            --login "$TARGET_LOGIN" \
            --name "$TARGET_NAME" \
            --avatar-url "$TARGET_AVATAR_URL" \
            --profile "$TARGET_PROFILE" \
            --contributions-json "$CONTRIBUTIONS_JSON" >> "$GITHUB_OUTPUT"

      - name: Commit Hall of Fame update
        if: steps.parse.outputs.valid == 'true' && steps.metadata.outputs.found == 'true' && steps.hall_of_fame.outputs.changed == 'true'
        env:
          TARGET_LOGIN: ${{ steps.metadata.outputs.login }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .all-contributorsrc CONTRIBUTORS.md
          git commit -m "docs: update @$TARGET_LOGIN Hall of Fame credits"
          git fetch origin "${{ github.event.repository.default_branch }}"
          git rebase "origin/${{ github.event.repository.default_branch }}"
          git push origin HEAD:"${{ github.event.repository.default_branch }}"

      - name: Reply with result
        if: steps.parse.outputs.valid == 'true' && steps.metadata.outputs.found == 'true'
        uses: actions/github-script@v8
        env:
          TARGET_LOGIN: ${{ steps.metadata.outputs.login }}
          CHANGED: ${{ steps.hall_of_fame.outputs.changed }}
          ADDED: ${{ steps.hall_of_fame.outputs.added }}
          NEW_CONTRIBUTIONS: ${{ steps.hall_of_fame.outputs.new_contributions }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const login = process.env.TARGET_LOGIN;
            const changed = process.env.CHANGED === 'true';
            const added = process.env.ADDED === 'true';
            const newContributions = process.env.NEW_CONTRIBUTIONS
              ? process.env.NEW_CONTRIBUTIONS.split(',').filter(Boolean)
              : [];
            const hallOfFameLink =
              `https://github.com/${context.repo.owner}/${context.repo.repo}/blob/` +
              `${context.payload.repository.default_branch}/CONTRIBUTORS.md`;

            let body;
            if (added) {
              body = `Added @${login} to the [Contributors Hall of Fame](${hallOfFameLink}).`;
            } else if (changed && newContributions.length > 0) {
              body = `Updated @${login}'s Hall of Fame credits: ${newContributions.join(', ')}. ` +
                `[View the Hall of Fame](${hallOfFameLink}).`;
            } else if (changed) {
              body = `Refreshed @${login}'s [Hall of Fame entry](${hallOfFameLink}).`;
            } else {
              body = `@${login} is already credited for those contributions in the ` +
                `[Contributors Hall of Fame](${hallOfFameLink}).`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
