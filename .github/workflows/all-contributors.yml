name: All Contributors — Auto-Credit

on:
  # Respond to "@all-contributors please add @user for type" comments
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  add-contributor:
    name: Add Contributor
    runs-on: ubuntu-latest
    # Only respond to the bot command — any commenter can trigger this
    if: contains(github.event.comment.body, '@all-contributors')
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run All Contributors Bot
        uses: all-contributors/all-contributors-bot@v2.3.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
