name: Protected Files Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  statuses: write

jobs:
  protected-files:
    name: Protected Files Check
    runs-on: ubuntu-latest
    steps:
      - name: Check for auto-generated file edits
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const author = pr.user.login;
            const prNumber = pr.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Maintainer and bots are allowed to touch these
            const EXEMPT_USERS = ['ambicuity', 'github-actions[bot]', 'dependabot[bot]'];
            if (EXEMPT_USERS.includes(author)) {
              console.log(`Exempt user ${author} — skipping protected files check.`);
              return;
            }

            // gujarati-python protected files
            const PROTECTED = ['web/out/'];

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner, repo, pull_number: prNumber
            });

            const violations = files
              .map(f => f.filename)
              .filter(name => PROTECTED.some(p => name.startsWith(p) || name === p));

            if (violations.length === 0) {
              console.log('No protected files touched. Check passed.');

              // Remove prior failure comment if it exists (clean commit fixed it)
              const comments = await github.rest.issues.listComments({
                owner, repo, issue_number: prNumber
              });
              const prior = comments.data.find(c =>
                c.user.login === 'github-actions[bot]' &&
                c.body.includes('auto-generated')
              );
              if (prior) {
                await github.rest.issues.deleteComment({
                  owner, repo, comment_id: prior.id
                });
              }
              return;
            }

            // Post failure comment
            const bold = (s) => `**${s}**`;
            const fileList = violations.map(f => `- \`${f}\``).join('\n');
            const body = [
              '## ❌ PR Touches Auto-Generated Files',
              '',
              `@${author}, this PR modifies file(s) that are **auto-generated**.`,
              'Any manual edits will be overwritten during build.',
              '',
              bold('Files that must not be manually edited:'),
              fileList,
              '',
              '| File | Why it is protected |',
              '|------|---------------------|',
              '| `web/out/` | Auto-generated Next.js build output |',
              '',
              bold('How to fix:'),
              '```bash',
              'git checkout HEAD~1 -- ' + violations.join(' '),
              '# or, if you edited them locally:',
              'git checkout origin/main -- ' + violations.join(' '),
              'git push',
              '```',
              '',
              'This check will pass automatically once those files are removed from the diff.',
            ].join('\n');

            // Post or update
            const allComments = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber
            });
            const existing = allComments.data.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('auto-generated')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber, body
              });
            }

            core.setFailed(
              `PR touches auto-generated file(s): ${violations.join(', ')}. ` +
              `Run: git checkout origin/main -- ${violations.join(' ')}`
            );
