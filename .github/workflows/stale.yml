name: Stale Issue Management

on:
  schedule:
    # Runs daily at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  stale:
    name: Mark and Close Stale Issues
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # ---- Issues ----
          # Mark "needs-triage" issues stale after 30 days of inactivity
          days-before-issue-stale: 30
          # Close stale issues after another 14 days with no activity
          days-before-issue-close: 14
          stale-issue-label: 'stale'
          stale-issue-message: |
            👋 This issue has been inactive for 30 days.
            If it is still relevant, please leave a comment and a maintainer will re-triage it.
            It will be automatically closed in 14 days if there is no further activity.
          close-issue-message: |
            🔒 This issue has been closed due to inactivity.
            If the problem persists, please open a new issue with fresh information.
          close-issue-reason: not_planned

          # ---- Pull Requests ----
          # Mark PRs stale after 14 days of no activity
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-pr-label: 'stale'
          stale-pr-message: |
            👋 This pull request has been inactive for 14 days.
            Please rebase on the latest `main` and address any open review comments to keep it moving forward.
            It will be automatically closed in 7 days if there is no further activity.
          close-pr-message: |
            🔒 This PR has been closed due to inactivity. Please feel free to re-open it when you are ready to continue.

          # ---- Exemptions ----
          # Never mark these as stale
          exempt-issue-labels: 'pinned,security,good first issue,good first issue candidate,help wanted,architecture,beginner,intermediate,advanced,needs-triage,plan-me,blocked'
          exempt-pr-labels: 'pinned,security,work-in-progress,merge-conflict'
          exempt-all-assignees: true
