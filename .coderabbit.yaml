# Docs: https://docs.coderabbit.ai/
language: "en-US" # USA English
early_access: true

# ============================================================================
issue_enrichment:
  planning:
    enabled: true
    auto_planning:
      enabled: true
      labels:
        - "plan-me"

# ============================================================================
knowledge_base: # Enable knowledge base access for up-to-date information
  web_search: # Enable web search for up-to-date information
    enabled: true
  learnings:
    scope: "auto"
  issues:
    scope: "auto"
  pull_requests:
    scope: "auto"

# ============================================================================
reviews:
  profile: "assertive" # Assertive profile yields more feedback, that may be considered nitpicky.
  request_changes_workflow: true
  assess_linked_issues: true

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "main"

  # Noise reduction settings
  high_level_summary: false # Do not summarise a pull request first as there is a walkthrough
  review_status: false # Do not state what kind of review as performed or why (spammy)
  commit_status: false # Do not state the review is in progress (spammy)
  collapse_walkthrough: false # Provide a walkthrough for reviewers
  related_issues: false # Do not suggest related issues (spammy)
  related_prs: false # Do not suggest related PRs (spammy)
  suggested_labels: false # Do not suggest labels for the PR (spammy)
  suggested_reviewers: false # Do not suggest reviewers for the PR (spammy)
  in_progress_fortune: false # Do not stall time with a message (spammy)
  poem: false # Do not write a literal poem (spammy)
  enable_prompt_for_ai_agents: false # Disable prompts for AI agents (spammy)

  # ============================================================
  # GLOBAL REVIEW INSTRUCTIONS (APPLY TO ALL FILES)
  # ============================================================
  instructions: |
    You are a code reviewer whose primary responsibility is to verify that the code changes in this pull request fully address the specific requirements outlined in the associated issue description or pull request description.
    
    **ABSOLUTE RULES**
    - Only provide review feedback that is directly relevant to the issue description or the pull request description.
    - Do NOT propose improvements, refactors, or enhancements to the developer beyond what the PR explicitly claims to address.
    
    **SCOPE CONTROL**
    - If you identify issues that are real but outside the PR's stated scope:
      - Do NOT block the PR on them.
      - Do NOT suggest fixes inline.
      - Instead, aggregate all out-of-scope issues into a single comment with a list of recommendations for one or more follow-up issues that can be created.

  # ===== PATH-SPECIFIC REVIEW DIRECTIVES =====
  path_instructions:

    # ── Core Parser Engine ──────────────────────────────────────────────────
    - path: "મુખ્ય.py"
      instructions: |
        This file handles the main lexing and translation from Gujarati to Python.
        Apply senior-level scrutiny.

        ## Correctness (Non-Negotiable)
        1. All Gujarati mappings must handle UTF-8 properly.
        2. Flag any use of exec() or eval() that processes unescaped or unvalidated user input. Highlight any generated Python string mapping that lacks proper indentation.
        3. No bare `except:` clauses. Catch specific exceptions.
        4. Check for the presence of a docstring for every new function. Request changes if the docstring does not explicitly list the arguments and return types.
        5. Variable naming in Python generation must be collision-free.

        ## Architecture
        6. Flag fundamental architectural changes or new deep language features and explicitly ask the author for a link to the corresponding issue discussion.
        7. If adding a new fundamental data type, ensure test coverage in `ટેસ્ટ/`.

    # ── Web Playground ──────────────────────────────────────────────────────
    - path: "web/**"
      instructions: |
        This is the Next.js frontend for the in-browser Gujarati Python playground.
        1. Keep client-side evaluation safe (do not use raw `eval()` directly without a sandbox if executing JS).
        2. Ensure mobile-responsive UI doesn't break.
        3. Flag the addition of any new NPM dependencies and explicitly ask the author to justify the bundle size impact in the PR comments.

    # ── Unit Tests ───────────────────────────────────────────────────────────
    - path: "ટેસ્ટ/**"
      instructions: |
        You are acting as a senior maintainer reviewing unit tests for the gujarati-python project. Your goal is to ensure tests are extensive, deterministic, and protect against breaking changes.

        CRITICAL PRINCIPLES - Tests Must Fail Loudly & Deterministically:
        - Tests must provide useful error messages when they fail for future debugging.
        - No `print()` statements - use assertions with descriptive messages.
        - No timing-dependent or unseeded random assertions. Ensure any mocked data or AST parsing validations match the Gujarati lexer's expected output format.

        EXPECTATIONS:
        - Test constructor behavior with valid inputs, edge cases, and invalid inputs.
        - Cover happy paths AND unhappy paths/edge cases.
        - Avoid linter or formatting feedback. Focus on functional test coverage.

    # ── GitHub Actions Workflows ─────────────────────────────────────────────
    - path: ".github/workflows/**"
      instructions: |
        You are reviewing GitHub Actions workflows as a thoughtful senior engineer. Your goal is to nudge contributors toward higher-quality, maintainable workflows.

        SECURITY ESSENTIALS:
        1. Workflow permissions must be minimally scoped (`contents: read` unless write is justified).
        2. Flag any `pull_request_target` trigger without tight limits.
        3. Flag any workflow that echoes GitHub secrets.
        4. Treat all GitHub event data as potentially untrusted input: issue titles, bodies, comments, labels. Free-form user input must not flow directly into shell commands.

        OPERATIONAL QUALITY & DRY-RUN
        - Log key decisions and early exits — avoid silent skips.
        - Avoid raw payload dumps and any secret or token leakage.

    # ── Shell Scripts ────────────────────────────────────────────────────────
    - path: ".github/scripts/**/*.sh"
      instructions: |
        Review shell scripts as production-grade CI automation.

        Firm expectations:
        - Use `set -euo pipefail` to fail fast on errors.
        - Environment variables should be passed from the YAML, validated early, and defensively quoted.
        - No `eval`, `bash -c`, backticks, or `$(...)` with untrusted content.
        - Log key decisions and early exits.

    # ── CODEOWNERS ───────────────────────────────────────────────────────────
    - path: ".github/CODEOWNERS"
      instructions: |
        You are acting as a senior maintainer reviewing the CODEOWNERS file. This file controls review enforcement and repository governance.

        Your role is to verify correctness, coverage, and organizational alignment — not formatting preferences.
        1. Ensure teams used actually exist and have write permissions.
        2. Verify directory matching syntax correctly uses `/**` (e.g., `/.github/workflows/**`).
        3. Flag precedence errors (e.g. broad rule `*` after specific rules, last-match-wins missed).
        4. Do NOT suggest stylistic formatting changes.

# ============================================================================
chat:
  art: false # Don't draw ASCII art (false)
  auto_reply: false # Don't allow bot to converse (spammy)
