# Docs: https://docs.coderabbit.ai/
language: "en-US"
early_access: true

# ============================================================================
issue_enrichment:
  planning:
    enabled: true
    auto_planning:
      enabled: true
      labels:
        - "plan-me"

# ============================================================================
reviews:
  profile: "assertive"
  request_changes_workflow: true
  assess_linked_issues: true

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "main"

  # ===== PATH-SPECIFIC REVIEW DIRECTIVES =====
  path_instructions:

    # ── Core Parser Engine ──────────────────────────────────────────────────
    - path: "મુખ્ય.py"
      instructions: |
        This file handles the main lexing and translation from Gujarati to Python.
        Apply senior-level scrutiny.

        ## Correctness (Non-Negotiable)
        1. All Gujarati mappings must handle UTF-8 properly.
        2. Prevent syntax errors in the generated Python code (`exec` safety).
        3. No bare `except:` clauses. Catch specific exceptions.
        4. Every new function requires a docstring in English or Gujarati.
        5. Variable naming in Python generation must be collision-free.

        ## Architecture
        6. Reject PRs adding deep language features without a prior Issue discussion.
        7. If adding a new fundamental data type, ensure test coverage in `ટેસ્ટ/`.

    # ── Web Playground ──────────────────────────────────────────────────────
    - path: "web/**"
      instructions: |
        This is the Next.js frontend for the in-browser Gujarati Python playground.
        1. Keep client-side evaluation safe (do not use raw `eval()` directly without a sandbox if executing JS).
        2. Ensure mobile-responsive UI doesn't break.
        3. Do not add heavy NPM dependencies without justification.

    # ── GitHub Actions Workflows ─────────────────────────────────────────────
    - path: ".github/workflows/**"
      instructions: |
        SECURITY-CRITICAL. Apply zero-trust review.
        1. Workflow permissions must be minimally scoped (`contents: read` unless write is justified).
        2. Flag any `pull_request_target` trigger without tight limits.
        3. Reject any workflow that echoes GitHub secrets.

    # ── Catch-all ────────────────────────────────────────────────────────────
    - path: "**/*"
      instructions: |
        GLOBAL STANDARDS — applies to every file in every PR.
        1. Every PR must link to an issue via `Fixes #N`.
        2. Reject PRs that are clearly unreviewed AI output: no tests, no docstrings.
        3. PRs should be small and focused. Flag PRs that change more than 3 unrelated areas.

# ============================================================================
chat:
  auto_reply: true

# ============================================================================
knowledge_base:
  learnings:
    scope: "auto"
  issues:
    scope: "auto"
  pull_requests:
    scope: "auto"
